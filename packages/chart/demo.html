<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>@domphy/chart Audit</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f8f9fa; font-family: system-ui, sans-serif; padding: 24px; }
    h1 { font-size: 20px; margin-bottom: 20px; color: #333; }
    h2 { font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    .chart-box { width: 100%; height: 280px; position: relative; background: #fafafa; border-radius: 4px; }
    .error { color: #c00; font-size: 11px; padding: 8px; }
    .full-width { grid-column: span 2; }
    .single { grid-column: span 1; }
  </style>
</head>
<body>
  <h1>@domphy/chart — Visual Audit</h1>
  <div class="grid" id="grid"></div>
  <script type="module" src="./demo-main.ts"></script>
</body>
</html>
