<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Domphy — Patch-based UI</title>
  <meta name="description" content="A Patch-based UI engine. Native elements, no components. DOM rendering, SSR, and CSS-in-JS — one package." />
  <link rel="icon" href="./favicon.svg" />
  <script src="https://unpkg.com/@domphy/ui/dist/core-theme-ui.global.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; }
    pre { font-family: ui-monospace, 'Cascadia Code', monospace; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module">
    const { core, theme, ui } = window.Domphy
    const { ElementNode, toState } = core
    const { themeApply, themeColor, themeSpacing } = theme
    const { button, link, heading, paragraph, small, code } = ui

    themeApply()

    const copied = toState(false)

    function copyInstall() {
      navigator.clipboard.writeText('npm install @domphy/ui')
      copied.set(true)
      setTimeout(() => copied.set(false), 2000)
    }

    const sp = themeSpacing

    // ── Nav ──────────────────────────────────────────────────────────────────
    const Nav = {
      nav: [
        {
          a: 'Domphy',
          href: '/',
          style: {
            fontWeight: '700',
            fontSize: '1.1rem',
            textDecoration: 'none',
            color: 'inherit',
          }
        },
        {
          div: [
            { a: 'Docs', href: '/docs/', $: [link()] },
            { a: 'GitHub', href: 'https://github.com/domphy/domphy', target: '_blank', $: [link()] },
            { a: 'npm', href: 'https://www.npmjs.com/package/@domphy/ui', target: '_blank', $: [link()] },
          ],
          style: { display: 'flex', gap: sp(4), alignItems: 'center' }
        }
      ],
      style: {
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
        padding: `${sp(3)} ${sp(6)}`,
        borderBottom: (l) => `1px solid ${themeColor(l, 'shift-2', 'neutral')}`,
        position: 'sticky',
        top: '0',
        zIndex: '10',
        backdropFilter: 'blur(8px)',
        backgroundColor: (l) => `color-mix(in srgb, ${themeColor(l, 'inherit', 'neutral')} 85%, transparent)`,
      }
    }

    // ── Hero ─────────────────────────────────────────────────────────────────
    const Hero = {
      section: [
        {
          h1: 'A Patch-based UI.',
          $: [heading()],
          style: { fontSize: 'clamp(2rem, 6vw, 3.5rem)', letterSpacing: '-0.02em' }
        },
        {
          p: 'Native elements, no components. DOM rendering, SSR, and CSS-in-JS — one model, five functions.',
          $: [paragraph()],
          style: { maxWidth: '520px', margin: '0 auto', opacity: '0.7' }
        },
        {
          div: [
            {
              button: 'Get Started →',
              $: [button({ color: 'primary' })],
              onClick: () => location.href = '/docs/',
            },
            {
              code: (l) => copied.get(l) ? 'Copied!' : 'npm install @domphy/ui',
              $: [code()],
              onClick: copyInstall,
              style: { cursor: 'pointer' }
            }
          ],
          style: { display: 'flex', gap: sp(3), alignItems: 'center', flexWrap: 'wrap', justifyContent: 'center' }
        }
      ],
      style: {
        textAlign: 'center',
        padding: `${sp(20)} ${sp(6)} ${sp(16)}`,
        display: 'flex',
        flexDirection: 'column',
        gap: sp(6),
        alignItems: 'center',
      }
    }

    // ── Code snippet ──────────────────────────────────────────────────────────
    const snippet =
`import { ElementNode, toState } from "@domphy/core"
import { themeApply } from "@domphy/theme"
import { button, tooltip } from "@domphy/ui"

themeApply()

const count = toState(0)

const App = {
  div: [
    { p: (l) => \`Count: \${count.get(l)}\` },
    {
      button: "Increment",
      $: [button(), tooltip({ content: "Click me" })],
      onClick: () => count.set(count.get() + 1),
    }
  ]
}

new ElementNode(App).render(document.body)`

    const CodeBlock = {
      div: [
        {
          div: [
            { span: '● ', style: { color: '#ff5f57' } },
            { span: '● ', style: { color: '#febc2e' } },
            { span: '● ', style: { color: '#28c840' } },
          ],
          style: { display: 'flex', gap: sp(1), padding: `${sp(2)} ${sp(3)}`, borderBottom: (l) => `1px solid ${themeColor(l, 'shift-2', 'neutral')}` }
        },
        {
          pre: snippet,
          style: {
            padding: sp(4),
            overflowX: 'auto',
            lineHeight: '1.6',
            fontSize: '0.875rem',
          }
        }
      ],
      style: {
        borderRadius: sp(3),
        border: (l) => `1px solid ${themeColor(l, 'shift-2', 'neutral')}`,
        backgroundColor: (l) => themeColor(l, 'shift-1', 'neutral'),
        textAlign: 'left',
        maxWidth: '600px',
        width: '100%',
        margin: '0 auto',
        overflow: 'hidden',
      }
    }

    const CodeSection = {
      section: [CodeBlock],
      style: { padding: `0 ${sp(6)} ${sp(16)}` }
    }

    // ── Features ──────────────────────────────────────────────────────────────
    const features = [
      {
        title: 'No components',
        desc: 'Patches augment native elements without wrapping or owning them. No lifecycle, no state, no DOM boundary.',
      },
      {
        title: 'One model',
        desc: 'DOM rendering, SSR, and CSS-in-JS — one package. No duplicate templates between server and client.',
      },
      {
        title: '5 functions',
        desc: 'toState, merge, themeColor, themeSize, themeSpacing. Master these and you can build anything.',
      },
      {
        title: 'No adapters',
        desc: 'Works with any JavaScript library — Zustand, TanStack Query, SortableJS, i18next. No plugins needed.',
      },
    ]

    const Features = {
      section: [
        {
          div: features.map(f => ({
            div: [
              { h3: f.title, $: [heading()], style: { marginBottom: sp(2) } },
              { p: f.desc, $: [paragraph()], style: { opacity: '0.65' } },
            ],
            style: {
              padding: sp(5),
              borderRadius: sp(3),
              border: (l) => `1px solid ${themeColor(l, 'shift-2', 'neutral')}`,
              backgroundColor: (l) => themeColor(l, 'shift-1', 'neutral'),
            }
          })),
          style: {
            display: 'grid',
            gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))',
            gap: sp(4),
            maxWidth: '900px',
            margin: '0 auto',
          }
        }
      ],
      style: { padding: `0 ${sp(6)} ${sp(16)}` }
    }

    // ── Footer ────────────────────────────────────────────────────────────────
    const Footer = {
      footer: [
        {
          div: [
            { a: 'Docs', href: '/docs/', $: [link()] },
            { a: 'GitHub', href: 'https://github.com/domphy/domphy', target: '_blank', $: [link()] },
            { a: 'npm', href: 'https://www.npmjs.com/package/@domphy/ui', target: '_blank', $: [link()] },
          ],
          style: { display: 'flex', gap: sp(4) }
        },
        {
          small: 'Released under the MIT License.',
          $: [small()],
          style: { opacity: '0.5' }
        }
      ],
      style: {
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
        flexWrap: 'wrap',
        gap: sp(3),
        padding: `${sp(5)} ${sp(6)}`,
        borderTop: (l) => `1px solid ${themeColor(l, 'shift-2', 'neutral')}`,
      }
    }

    // ── App ───────────────────────────────────────────────────────────────────
    const App = {
      div: [Nav, Hero, CodeSection, Features, Footer],
      dataTheme: 'dark',
      style: {
        minHeight: '100vh',
        display: 'flex',
        flexDirection: 'column',
        backgroundColor: (l) => themeColor(l, 'inherit', 'neutral'),
        color: (l) => themeColor(l, 'shift-10', 'neutral'),
      }
    }

    new ElementNode(App).render(document.getElementById('app'))
  </script>
</body>
</html>
